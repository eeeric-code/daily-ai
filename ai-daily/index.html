<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>每日 AI 简报</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0b0d10;
    color: #e6e8eb;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 520px;
    text-align: center;
    background: #14181d;
    border: 1px solid #232830;
    border-radius: 16px;
    padding: 40px 32px;
  }
  h1 {
    font-size: 28px;
    background: linear-gradient(120deg, #7ee787, #79c0ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
  }
  p { color: #8b929b; font-size: 14px; margin: 8px 0; }
  .date { color: #79c0ff; font-family: ui-monospace, monospace; font-size: 15px; }
  a.btn {
    display: inline-block;
    margin-top: 24px;
    padding: 12px 24px;
    background: #7ee787;
    color: #0b0d10;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    transition: transform 0.15s;
  }
  a.btn:hover { transform: translateY(-1px); }
  .small { margin-top: 20px; font-size: 12px; color: #5e6770; }
  .small a { color: #79c0ff; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>每日 AI 简报</h1>
    <p>今天：<span class="date" id="today">—</span></p>
    <p>由 Mavis 每天 9:00 自动整理推送</p>
    <a class="btn" id="todayBtn" href="./">阅读今日简报 →</a>
    <p class="small">
      <a href="../archive.html">查看历期归档</a> · <a href="../">回到首页</a>
    </p>
  </div>

<script>
  // 客户端计算"今天"日期（YYYY-MM-DD 格式）
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth() + 1).padStart(2, '0');
  const dd = String(today.getDate()).padStart(2, '0');
  const todayStr = `${yyyy}-${mm}-${dd}`;

  document.getElementById('today').textContent = todayStr;
  document.getElementById('todayBtn').href = `./${todayStr}/index.html`;
</script>
</body>
</html>
