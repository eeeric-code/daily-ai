<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily AI · 多模型每日简报</title>
<style>
  :root {
    --bg:#0b0d10;--card:#14181d;--card-2:#10141a;--border:#232830;--text:#e6e8eb;
    --muted:#8b929b;--muted-2:#5e6770;--accent:#7ee787;--accent-2:#79c0ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.6}
  body::before{content:"";position:fixed;inset:0;background:
    radial-gradient(circle at 18% 24%,rgba(126,231,135,.08),transparent 34%),
    radial-gradient(circle at 82% 70%,rgba(121,192,255,.07),transparent 36%),
    linear-gradient(180deg,rgba(255,255,255,.03),transparent 38%);pointer-events:none}
  .wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:72px 28px 88px}
  .brand-row{display:inline-flex;align-items:center;gap:10px;padding:6px 14px;border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--muted);background:rgba(20,24,29,.72);margin-bottom:44px}
  .brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(126,231,135,.18)}
  h1{font-size:clamp(42px,8vw,76px);line-height:1.05;letter-spacing:0;font-weight:800;margin-bottom:16px;background:linear-gradient(135deg,#7ee787 0%,#79c0ff 60%,#d2a8ff 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .slogan{color:var(--muted);font-size:clamp(15px,2.2vw,18px);max-width:640px;margin-bottom:42px}
  .model-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:34px}
  .model-card{background:linear-gradient(180deg,var(--card),var(--card-2));border:1px solid var(--border);border-radius:8px;padding:24px;min-height:270px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .18s,border-color .18s}
  .model-card:hover{transform:translateY(-2px);border-color:var(--model-accent)}
  .model-head{display:flex;align-items:center;gap:10px;color:var(--model-accent);font-family:ui-monospace,"SFMono-Regular",monospace;font-size:13px}
  .model-dot{width:10px;height:10px;border-radius:50%;background:var(--model-accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--model-accent) 20%,transparent)}
  h2{font-size:26px;line-height:1.2;margin:18px 0 8px;letter-spacing:0}
  .model-desc{color:var(--muted);font-size:14px;margin-bottom:18px}
  .model-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .model-meta span{font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:4px 10px;background:rgba(255,255,255,.03)}
  .model-actions{display:flex;gap:10px;flex-wrap:wrap}
  .model-actions a{display:inline-flex;align-items:center;justify-content:center;min-height:38px;padding:8px 14px;border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-weight:650;font-size:13px;background:rgba(255,255,255,.04)}
  .model-actions a.primary{background:var(--model-accent);border-color:var(--model-accent);color:#0b0d10}
  .footer{padding-top:26px;border-top:1px solid var(--border);color:var(--muted-2);font-size:13px;display:flex;gap:12px;flex-wrap:wrap}
  .footer a{color:var(--accent-2);text-decoration:none}
  @media(max-width:700px){.wrap{padding:44px 20px 64px}.model-grid{grid-template-columns:1fr}.model-card{min-height:240px}}
</style>

  <meta property="og:title" content="AI Daily · 多模型每日简报" />
  <meta property="og:description" content="AI 学术与产业每日简报 · 多模型版本横向对比" />
  <meta property="og:image" content="https://daily-ai-2o3.pages.dev/og-cover.png" />
  <link rel="icon" type="image/svg+xml" href="https://daily-ai-2o3.pages.dev/favicon.svg" />
  <!-- audit-autofix-marker -->
</head>
<body>
  <main class="wrap">
    <div class="brand-row"><span class="brand-dot"></span><span>Daily AI · 多模型每日推送</span></div>
    <h1>AI Daily</h1>
    <p class="slogan">选择一个模型版本查看对应简报和往期归档。不同模型版本使用独立目录，便于横向比较同一主题下的生成结果。</p>
    <div class="model-grid">

      <section class="model-card" style="--model-accent:#7ee787;--model-accent-2:#79c0ff">
        <div class="model-head">
          <span class="model-dot"></span>
          <span class="model-name">gpt</span>
        </div>
        <h2>gpt 简报</h2>
        <p class="model-desc">当前 GPT 生成的简报版本。</p>
        <div class="model-meta">
          <span>最新：2026-07-09</span>
          <span>10 期已收录</span>
        </div>
        <div class="model-actions">
          <a class="primary" href="./ai-daily/gpt/2026-07-09/">阅读最新</a>
          <a href="./ai-daily/gpt/archive.html">往期归档</a>
        </div>
      </section>
      <section class="model-card" style="--model-accent:#f9d65a;--model-accent-2:#ff9f6e">
        <div class="model-head">
          <span class="model-dot"></span>
          <span class="model-name">minimax</span>
        </div>
        <h2>minimax 简报</h2>
        <p class="model-desc">历史 MiniMax 生成的简报版本。</p>
        <div class="model-meta">
          <span>最新：2026-07-08</span>
          <span>9 期已收录</span>
        </div>
        <div class="model-actions">
          <a class="primary" href="./ai-daily/minimax/2026-07-09/">阅读最新</a>
          <a href="./ai-daily/minimax/archive.html">往期归档</a>
        </div>
      </section>
    </div>
    <div class="footer">
      <span>© 2026 AI Daily Brief · Mavis</span>
      <a href="./archive.html">全部模型归档</a>
      <a href="https://github.com/eeeric-code/daily-ai" target="_blank" rel="noopener">GitHub</a>
    </div>
  </main>
</body>
</html>
