<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily AI · 每日 AI 简报</title>
<style>
  :root {
    --bg: #0b0d10;
    --bg-2: #0e1116;
    --card: #14181d;
    --border: #232830;
    --border-2: #2d343d;
    --text: #e6e8eb;
    --muted: #8b929b;
    --muted-2: #5e6770;
    --accent: #7ee787;
    --accent-2: #79c0ff;
    --accent-3: #d2a8ff;
    --gradient: linear-gradient(135deg, #7ee787 0%, #79c0ff 60%, #d2a8ff 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                 "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* 背景网格 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(126,231,135,0.06), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(121,192,255,0.06), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(210,168,255,0.04), transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 80px 28px 96px;
    text-align: center;
  }

  .brand-row {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 56px;
    backdrop-filter: blur(8px);
    background: rgba(20,24,29,0.6);
  }
  .brand-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
    box-shadow: 0 0 0 4px rgba(126,231,135,0.18);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(1.18); }
  }

  h1 {
    font-size: clamp(48px, 9vw, 84px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -2px;
    background: var(--gradient);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 18px;
    animation: fadeUp 0.7s ease-out;
  }
  .slogan {
    font-size: clamp(16px, 2.4vw, 19px);
    color: var(--muted);
    max-width: 560px;
    margin: 0 auto 64px;
    animation: fadeUp 0.8s ease-out 0.1s backwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 56px;
    animation: fadeUp 0.8s ease-out 0.25s backwards;
  }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; max-width: 480px; }
  }
  @media (max-width: 560px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 24px;
    text-align: left;
    transition: all 0.2s ease;
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 14px;
    border: 1px solid transparent;
    background: var(--gradient) border-box;
    -webkit-mask: linear-gradient(#000 0 0) padding-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--border-2);
  }
  .card:hover::after { opacity: 0.6; }
  .card-icon {
    font-size: 22px;
    margin-bottom: 12px;
    display: block;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .card-link {
    font-family: ui-monospace, "SFMono-Regular", monospace;
    font-size: 12px;
    color: var(--accent-2);
    word-break: break-all;
    display: block;
  }
  .card-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    margin-top: 12px;
  }
  .tag-ok { background: rgba(126,231,135,0.12); color: var(--accent); }
  .tag-pending { background: rgba(210,153,34,0.12); color: #e3b341; }

  .signature {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    color: var(--muted-2);
    font-size: 13px;
    animation: fadeUp 0.8s ease-out 0.4s backwards;
  }
  .signature strong { color: var(--muted); font-weight: 500; }
  .signature a {
    color: var(--accent-2);
    text-decoration: none;
    transition: color 0.15s;
  }
  .signature a:hover { color: var(--accent); }
  .signature .sep { margin: 0 10px; color: var(--muted-2); }

  code {
    background: rgba(255,255,255,0.06);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    color: var(--accent-2);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand-row">
      <span class="brand-dot"></span>
      <span>Daily AI · 每日推送 · 全球视野</span>
    </div>

    <h1>AI Daily</h1>
    <p class="slogan">
      每天一封，覆盖全球 AI 学术 + 产业的真实动态。<br/>
      由 Mavis 自动整理与分发。
    </p>

    <div class="grid">
      

<a class="card" href="./ai-daily/2026-07-06/" target="_blank">
        <span class="card-icon">📰</span>
        <div class="card-title">每日 AI 简报</div>
        <div class="card-desc">每天 9:00 自动推送 · 学术 + 产业双视角</div>
        <code class="card-link">/ai-daily/2026-07-06/</code>
        <span class="card-tag tag-pending">今日已推送 · 2026-07-06</span>
      </a>
      <a class="card" href="./archive" target="_blank">
        <span class="card-icon">📚</span>
        <div class="card-title">往期简报</div>
        <div class="card-desc">所有过往的 AI 每日简报，按日期倒序排列。</div>
        <code class="card-link">/archive</code>
        <span class="card-tag tag-ok">7 期已收录</span>
      </a>
    </div>

    <div class="signature">
      <strong>访问地址</strong>
      
      <span class="sep">·</span>
      <a href="https://github.com/eeeric-code/daily-ai" target="_blank">GitHub</a>
      <span class="sep">·</span>
      <span id="lastUpdate">—</span>
    </div>
  </div>

<script>
  // 从 GitHub API 拉最后更新时间
  fetch('https://api.github.com/repos/eeeric-code/daily-ai/commits?per_page=1')
    .then(r => r.json())
    .then(d => {
      if (Array.isArray(d) && d[0]) {
        const ts = new Date(d[0].commit.author.date);
        document.getElementById('lastUpdate').textContent =
          '更新于 ' + ts.toLocaleString('zh-CN', { hour12: false });
      }
    })
    .catch(() => {});
</script>
</body>
</html>
